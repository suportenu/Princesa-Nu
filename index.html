<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Princesa Emanuelly - 33 Fases</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            touch-action: manipulation;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .game-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #0a0a1a;
            justify-content: space-between;
        }

        canvas {
            display: block;
            width: 100%;
            flex: 1;
            min-height: 0;
            background: #000;
            cursor: pointer;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000;
            padding: 8px 15px;
            color: #ffefb9;
            font-weight: bold;
            font-size: 12px;
            font-family: monospace;
            flex-wrap: wrap;
            gap: 6px;
            z-index: 10;
            border-bottom: 2px solid #ff69b4;
        }

        .game-title {
            background: #000;
            color: #ffffff;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            border: 2px solid #ff69b4;
            text-shadow: 0 0 5px #ff69b4;
            white-space: nowrap;
        }

        .phase-badge {
            background: #ff69b4;
            color: #fff;
            padding: 4px 12px;
            border-radius: 25px;
            font-size: 11px;
        }

        .chance-badge {
            background: #ffaa33;
            color: #2a1a00;
            padding: 4px 12px;
            border-radius: 25px;
            font-size: 11px;
        }
        
        .lives-badge {
            background: #ff4444;
            color: white;
            padding: 4px 12px;
            border-radius: 25px;
            font-size: 11px;
        }

        .touch-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(0,0,0,0.85);
            gap: 15px;
            margin-bottom: env(safe-area-inset-bottom, 0px);
            z-index: 10;
        }

        .dpad {
            display: flex;
            gap: 20px;
        }

        .right-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            width: 70px;
            height: 70px;
            border-radius: 60px;
            font-size: 30px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            touch-action: manipulation;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.3);
        }

        .btn-left, .btn-right {
            background: radial-gradient(circle at 30% 30%, #f5b062, #c26a22);
            color: #2d1c08;
        }

        .btn-jump {
            background: radial-gradient(circle at 30% 30%, #e55a3a, #aa2a1a);
            color: white;
            width: 80px;
            font-size: 26px;
        }

        .btn-torch {
            background: radial-gradient(circle at 30% 30%, #ff6600, #cc4400);
            color: white;
            width: 80px;
            font-size: 22px;
        }

        @media (max-width: 600px) {
            .btn { width: 60px; height: 60px; font-size: 26px; }
            .btn-jump { width: 70px; font-size: 22px; }
            .btn-torch { width: 70px; font-size: 18px; }
            .touch-controls { padding: 10px 15px; gap: 12px; }
            .info-panel { padding: 6px 12px; font-size: 10px; }
            .game-title { font-size: 10px; padding: 3px 8px; }
            .right-actions { gap: 8px; }
        }

        @media (max-width: 450px) {
            .btn { width: 50px; height: 50px; font-size: 22px; }
            .btn-jump { width: 60px; font-size: 18px; }
            .btn-torch { width: 60px; font-size: 16px; }
            .dpad { gap: 12px; }
            .game-title { font-size: 8px; padding: 2px 6px; }
            .right-actions { gap: 6px; }
        }

        .controls-footer {
            text-align: center;
            padding: 6px;
            color: #e6c88a;
            font-size: 10px;
            background: rgba(0,0,0,0.5);
        }

        .result-overlay, .death-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            font-family: monospace;
        }

        .result-box {
            background: linear-gradient(135deg, #ffcc44, #ff9933);
            padding: 25px 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 0 30px #ffaa00;
            border: 3px solid #fff;
        }
        
        .death-box {
            background: linear-gradient(135deg, #331111, #110000);
            padding: 25px 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 0 30px #ff0000;
            border: 3px solid #ff4444;
        }
        
        .death-box h1 {
            color: #ff6666;
            font-size: 24px;
        }
        
        .death-box p {
            color: white;
            font-size: 16px;
            margin: 15px 0;
        }

        .result-box h1 {
            font-size: 24px;
            color: #2a1a00;
            margin-bottom: 15px;
        }

        .result-box .coin-count {
            font-size: 40px;
            color: #ffdd00;
            text-shadow: 3px 3px 0 #aa6600;
            margin: 15px 0;
        }

        .result-box .next-btn, .death-box .continue-btn {
            background: #2a6f3a;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 16px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 15px;
        }
        
        .death-box .continue-btn {
            background: #ff4444;
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="1000" height="500"></canvas>
    <div class="info-panel">
        <span class="game-title">⭐ PRINCESA EMANUELLY ⭐</span>
        <span class="phase-badge" id="phaseText">FASE 1/33</span>
        <span class="lives-badge" id="globalLivesText">💖 33</span>
        <span class="chance-badge" id="chanceText">🎲 3/3</span>
        <span>🍄 <span id="scoreText">0</span></span>
        <span>🪙 <span id="coinText">0</span></span>
        <span>🔥 TOCHA INFINITA</span>
    </div>
    <div class="touch-controls">
        <div class="dpad">
            <button id="leftBtn" class="btn btn-left">◀</button>
            <button id="rightBtn" class="btn btn-right">▶</button>
        </div>
        <div class="right-actions">
            <button id="jumpBtn" class="btn btn-jump">⭐</button>
            <button id="torchBtn" class="btn btn-torch">🔥</button>
        </div>
    </div>
    <div class="controls-footer">
        👆 Toque nos botões | 🔥 TOCHA INFINITA | 👹 GUARDIÃO precisa de 50 tochas!
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let W = 1000;
        let H = 500;
        const GROUND_Y = 430;
        
        function resizeCanvas() {
            const container = canvas.parentElement;
            const width = container.clientWidth;
            const availableHeight = window.innerHeight - 150;
            canvas.width = width;
            canvas.height = Math.min(availableHeight, 500);
            W = canvas.width;
            H = canvas.height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        // ÁUDIO
        let audioContext = null;
        let currentSongIndex = 0;
        let songTimeout = null;
        let musicGain = null;
        let isPlaying = false;
        let originalVolume = 0.5;
        let loweredVolume = 0.2;
        let isLoweringVolume = false;
        let rainGain = null;
        let rainInterval = null;
        let suspenseGain = null;
        let suspenseInterval = null;
        let isSuspenseActive = false;
        
        const tempo = 0.155;
        
        function noteFreq(note) {
            const map = {"C":-9,"C#":-8,"D":-7,"D#":-6,"E":-5,"F":-4,"F#":-3,"G":-2,"G#":-1,"A":0,"A#":1,"B":2};
            const pitch = note.slice(0,-1);
            const octave = parseInt(note.slice(-1));
            const semitone = map[pitch] + (octave - 4) * 12;
            return 440 * Math.pow(2, semitone / 12);
        }
        
        const fullSong = [
            ["E5",1],["E5",1],["R",1],["E5",1],["R",1],["C5",1],["E5",1],
            ["R",1],["G5",3],["R",3],["G4",3],["C5",2],["R",2],["G4",2],["R",2],
            ["E4",2],["R",2],["A4",2],["B4",2],["A#4",1],["A4",2],["G4",1.5],
            ["E5",1.5],["G5",1.5],["A5",2],["F5",1],["G5",1],["R",1],["E5",2],
            ["C5",1],["D5",1],["B4",2],["C5",2],["R",2],["G4",2],["R",2],["E4",2],
            ["R",2],["A4",2],["B4",2],["A#4",1],["A4",2],["G4",1.5],["E5",1.5],
            ["G5",1.5],["A5",2],["F5",1],["G5",1],["R",1],["E5",2],["C5",1],["D5",1],
            ["B4",2],["R",2],["G5",1],["F#5",1],["F5",1],["D#5",1],["E5",2],
            ["G#4",1],["A4",1],["C5",1],["A4",1],["C5",1],["D5",2],["R",2],
            ["G5",1],["F#5",1],["F5",1],["D#5",1],["E5",2],["C6",1],["C6",1],["C6",3],
            ["R",2],["C5",1],["C5",1],["C5",1],["R",1],["C5",1],["D5",1],["E5",2],
            ["C5",1],["D5",1],["E5",2],["C5",1],["D5",1],["E5",1],["F5",1],["G5",4],
            ["R",2],["G5",1],["G5",1],["G5",1],["E5",1],["C5",1],["D5",1],["E5",3],
            ["R",1],["C5",1],["D5",1],["B4",4],["R",2],["G5",1],["F#5",1],["F5",1],
            ["D#5",1],["E5",2],["G#4",1],["A4",1],["C5",1],["A4",1],["C5",1],["D5",2],
            ["D#5",2],["R",1],["D5",2],["C5",4],["R",2],["C5",1],["G4",1],["E4",2],
            ["A4",1],["B4",1],["A#4",1],["A4",2],["G4",2],["E5",2],["G5",2],["A5",2],
            ["F5",1],["G5",1],["E5",2],["C5",1],["D5",1],["B4",4],["R",2],["E5",1],
            ["C5",1],["G4",2],["G4",1],["A4",1],["B4",2],["A4",1],["G4",1],["E4",3],
            ["G4",1],["C5",1],["E5",2],["G5",3],["R",2],["C6",1],["G5",1],["E5",2],
            ["A5",1],["B5",1],["C6",4],["R",2],["G5",1],["E5",1],["C5",4],
            ["C5",2],["G4",2],["E4",8]
        ];
        
        const flagFanfare = [["C5",0.25],["E5",0.25],["G5",0.25],["C6",0.5],["G5",0.25],["E5",0.25],["C5",0.6]];
        
        function initAudio() {
            if (audioContext) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            musicGain = audioContext.createGain();
            musicGain.gain.value = originalVolume;
            musicGain.connect(audioContext.destination);
            suspenseGain = audioContext.createGain();
            suspenseGain.gain.value = 0;
            suspenseGain.connect(audioContext.destination);
            rainGain = audioContext.createGain();
            rainGain.gain.value = 0.15;
            rainGain.connect(audioContext.destination);
        }
        
        function startSuspenseMusic() {
            if (!audioContext || isSuspenseActive) return;
            isSuspenseActive = true;
            if (suspenseInterval) clearInterval(suspenseInterval);
            suspenseInterval = setInterval(() => {
                if (!audioContext || !isSuspenseActive) return;
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.type = 'sine';
                osc.frequency.value = 130.81;
                gain.gain.value = 0.1;
                osc.connect(gain);
                gain.connect(suspenseGain);
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 1.5);
                osc.stop(audioContext.currentTime + 1.5);
            }, 2800);
        }
        
        function stopSuspenseMusic() {
            if (suspenseInterval) { clearInterval(suspenseInterval); suspenseInterval = null; }
            isSuspenseActive = false;
        }
        
        function playRainSound() {
            if (!audioContext || !rainGain) return;
            if (rainInterval) clearInterval(rainInterval);
            rainInterval = setInterval(() => {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.type = 'white';
                osc.frequency.value = 100 + Math.random() * 200;
                gain.gain.value = 0.03 + Math.random() * 0.05;
                osc.connect(gain);
                gain.connect(rainGain);
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.3);
                osc.stop(audioContext.currentTime + 0.3);
            }, 150);
        }
        
        function stopRainSound() {
            if (rainInterval) { clearInterval(rainInterval); rainInterval = null; }
        }
        
        function playWindSound() {
            if (!audioContext || !rainGain) return;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'sine';
            osc.frequency.value = 80;
            gain.gain.value = 0.08;
            osc.connect(gain);
            gain.connect(rainGain);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 2);
            osc.stop(audioContext.currentTime + 2);
        }
        
        function playMusicNote(note, start, duration) {
            if (note === "R") return;
            const freq = noteFreq(note) * 0.65;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = "square";
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.0001, start);
            gain.gain.exponentialRampToValueAtTime(0.3, start + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
            osc.connect(gain);
            gain.connect(musicGain);
            osc.start(start);
            osc.stop(start + duration);
        }
        
        function playFanfareNote(note, start, duration) {
            if (note === "R") return;
            const freq = noteFreq(note) * 0.7;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = "square";
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.0001, start);
            gain.gain.exponentialRampToValueAtTime(0.35, start + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
            osc.connect(gain);
            gain.connect(musicGain);
            osc.start(start);
            osc.stop(start + duration);
        }
        
        function playFullSong() {
            if (!audioContext || !isPlaying) return;
            if (currentSongIndex >= fullSong.length) currentSongIndex = 0;
            const [note, len] = fullSong[currentSongIndex];
            const now = audioContext.currentTime;
            playMusicNote(note, now, tempo * len);
            currentSongIndex++;
            songTimeout = setTimeout(playFullSong, tempo * len * 1000);
        }
        
        function lowerMusicVolume() {
            if (!audioContext || !musicGain || isLoweringVolume) return;
            isLoweringVolume = true;
            musicGain.gain.setValueAtTime(musicGain.gain.value, audioContext.currentTime);
            musicGain.gain.linearRampToValueAtTime(loweredVolume, audioContext.currentTime + 0.3);
        }
        
        function restoreMusicVolume() {
            if (!audioContext || !musicGain) return;
            musicGain.gain.setValueAtTime(musicGain.gain.value, audioContext.currentTime);
            musicGain.gain.linearRampToValueAtTime(originalVolume, audioContext.currentTime + 0.3);
            setTimeout(() => { isLoweringVolume = false; }, 400);
        }
        
        function playFlagFanfareOnce() {
            if (!audioContext) return;
            let t = audioContext.currentTime;
            for (let i = 0; i < flagFanfare.length; i++) {
                const [note, dur] = flagFanfare[i];
                playFanfareNote(note, t, dur);
                t += dur;
            }
        }
        
        function startMusic() {
            if (!audioContext) initAudio();
            if (audioContext && audioContext.state === 'suspended') { audioContext.resume(); }
            if (isPlaying) return;
            isPlaying = true;
            currentSongIndex = 0;
            if (songTimeout) clearTimeout(songTimeout);
            playFullSong();
        }
        
        function stopMusic() { isPlaying = false; if (songTimeout) clearTimeout(songTimeout); }
        
        function playCoinSound() {
            if (!audioContext) return;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'sine';
            osc.frequency.value = 1046.50;
            gain.gain.value = 0.4;
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.15);
            osc.stop(audioContext.currentTime + 0.15);
        }
        
        function playPowerUpSound() {
            if (!audioContext) return;
            const notes = [261.63, 329.63, 392.00];
            for (let i = 0; i < notes.length; i++) {
                setTimeout(() => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.type = 'square';
                    osc.frequency.value = notes[i];
                    gain.gain.value = 0.3;
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.15);
                    osc.stop(audioContext.currentTime + 0.15);
                }, i * 80);
            }
        }
        
        function playBlockHitSound() {
            if (!audioContext) return;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'square';
            osc.frequency.value = 440;
            gain.gain.value = 0.2;
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.1);
            osc.stop(audioContext.currentTime + 0.1);
        }
        
        function playTorchSound() {
            if (!audioContext) return;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'sine';
            osc.frequency.value = 600;
            gain.gain.value = 0.3;
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.2);
            osc.stop(audioContext.currentTime + 0.2);
        }
        
        function playWaterTorchSound() {
            if (!audioContext) return;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'sine';
            osc.frequency.value = 450;
            gain.gain.value = 0.35;
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.2);
            osc.stop(audioContext.currentTime + 0.2);
        }
        
        function playDeathSound() {
            if (!audioContext) return;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'sawtooth';
            osc.frequency.value = 220;
            gain.gain.value = 0.5;
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.4);
            osc.stop(audioContext.currentTime + 0.4);
        }
        
        // CENÁRIOS
        let rainDrops = [];
        
        function createRain() {
            rainDrops = [];
            for (let i = 0; i < 150; i++) {
                rainDrops.push({ x: Math.random() * (worldWidth + 500), y: Math.random() * H, speed: 5 + Math.random() * 10, length: 10 + Math.random() * 15 });
            }
            playRainSound();
            playWindSound();
        }
        
        function drawRain() {
            for (let drop of rainDrops) {
                let dx = drop.x - cameraX;
                if (dx > -10 && dx < W + 10) {
                    ctx.beginPath();
                    ctx.moveTo(dx, drop.y);
                    ctx.lineTo(dx - 3, drop.y + drop.length);
                    ctx.strokeStyle = "#aaddffaa";
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
                drop.y += drop.speed;
                if (drop.y > H) { drop.y = 0; drop.x = Math.random() * (worldWidth + 500); }
            }
        }
        
        function drawMountainsAndTrees() {
            ctx.fillStyle = "#5a8e3a";
            for (let i = 0; i < 5; i++) {
                let mountainX = (i * 320) - (cameraX * 0.1) % 900;
                ctx.beginPath();
                ctx.moveTo(mountainX, GROUND_Y - 40);
                ctx.lineTo(mountainX + 80, GROUND_Y - 160);
                ctx.lineTo(mountainX + 160, GROUND_Y - 40);
                ctx.fill();
                ctx.fillStyle = "#4a7e2a";
                ctx.beginPath();
                ctx.moveTo(mountainX + 20, GROUND_Y - 40);
                ctx.lineTo(mountainX + 80, GROUND_Y - 135);
                ctx.lineTo(mountainX + 140, GROUND_Y - 40);
                ctx.fill();
            }
            for (let i = 0; i < 10; i++) {
                let treeX = (i * 280) - (cameraX * 0.2) % 850;
                ctx.fillStyle = "#3a6a1a";
                ctx.fillRect(treeX + 10, GROUND_Y - 55, 8, 35);
                ctx.fillStyle = "#2a5a0a";
                ctx.beginPath();
                ctx.ellipse(treeX + 14, GROUND_Y - 65, 12, 14, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(treeX + 6, GROUND_Y - 55, 10, 11, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(treeX + 22, GROUND_Y - 55, 10, 11, 0, 0, Math.PI*2);
                ctx.fill();
            }
        }
        
        function drawSkyBackground(phase) {
            const isNight = phase % 2 === 0;
            const hasRain = (phase % 3 === 0) || (phase === 33);
            const hasMoon = isNight && (phase % 4 === 0) && !hasRain;
            const hasSun = !isNight && (phase % 4 === 1) && !hasRain;
            const hasClouds = (phase % 3 !== 0) && !hasRain;
            
            if (hasRain && !rainDrops.length) { createRain(); }

                    totalScore += bonus;

                    if(audioContext) {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.type = 'square';
                        osc.frequency.value = 880;
                        gain.gain.value = 0.3;
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.start();
                        gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.3);
                        osc.stop(audioContext.currentTime + 0.3);
                    }
                }
            }
            setTimeout(playNextCoin, 100);
            document.getElementById('nextPhaseBtn').onclick = () => {
                document.body.removeChild(overlay);
                showingResult = false;
                if (currentPhase < TOTAL_PHASES) {
                    currentPhase++;
                    phaseAttempts = 3;
                    updateUI();
                    loadPhase(currentPhase);
                } else {
                    alert("🏆 PARABÉNS PRINCESA EMANUELLY! VOCÊ ZEROU O JOGO! 🏆");
                }
            };
        }
        
        function updateMovingHazards() {
            for (let h of movingHazards) {
                h.x += h.speed * h.direction;
                if (h.x < 150 || h.x > worldWidth - 150) h.direction *= -1;
            }
        }
        
        function updateBirds() {
            for (let b of birds) {
                b.x += b.speed;
                if (b.x > worldWidth + 300) b.x = -150;
                b.wing += 0.15;
            }
        }
        
        function drawBirds() {
            for (let b of birds) {
                let dx = b.x - cameraX;
                if (dx < -80 || dx > W + 80) continue;
                ctx.fillStyle = "#444";
                ctx.beginPath(); ctx.ellipse(dx, b.y, b.size, b.size/1.5, 0, 0, Math.PI*2); ctx.fill();
                const wingY = Math.sin(b.wing) > 0 ? -5 : 4;
                ctx.fillStyle = "#666";
                ctx.beginPath(); ctx.moveTo(dx - b.size, b.y); ctx.lineTo(dx - b.size - 6, b.y + wingY); ctx.lineTo(dx - b.size, b.y + 2); ctx.fill();
                ctx.beginPath(); ctx.moveTo(dx + b.size, b.y); ctx.lineTo(dx + b.size + 6, b.y + wingY); ctx.lineTo(dx + b.size, b.y + 2); ctx.fill();
                ctx.fillStyle = "#fff";
                ctx.fillRect(dx + b.size/2, b.y - 2, 2, 2);
            }
        }
        
        function handleCollisions() {
            let newY = player.y;
            let grounded = false;
            for (let plat of platforms) {
                if (player.x + player.w > plat.x && player.x < plat.x + plat.w) {
                    if (player.y + player.h <= plat.y + 12 && player.y + player.h + player.vy >= plat.y) {
                        newY = plat.y - player.h;
                        grounded = true;
                        player.vy = 0;
                        break;
                    }
                    if (player.vy < 0 && player.y <= plat.y + plat.h && player.y + player.vy >= plat.y + plat.h) {
                        player.vy = 3;
                    }
                }
            }
            player.y = newY;
            player.onGround = grounded;
            if (player.y + player.h >= GROUND_Y && !grounded) {
                player.y = GROUND_Y - player.h;
                player.vy = 0;
                player.onGround = true;
            }
            let wasUnderwater = player.isUnderwater;
            player.isUnderwater = isAquaticPhase(currentPhase) && (player.y + player.h > waterLevel);
            if (player.isUnderwater && !wasUnderwater && !isRespawning) { startSuspenseMusic(); }
            else if (!player.isUnderwater && wasUnderwater) { stopSuspenseMusic(); }
            if (player.isUnderwater && !isRespawning) {
                if (player.x < maxWaterProgressX - 30) { player.x = maxWaterProgressX - 30; player.vx = 0; }
                if (player.x > maxWaterProgressX) { maxWaterProgressX = player.x; }
            } else if (!isRespawning) { maxWaterProgressX = player.x; }
            if (!player.onGround && !isRespawning) {
                isJumpingAnim = true;
                jumpAnimTimer = 5;
            } else if (jumpAnimTimer > 0) {
                jumpAnimTimer--;
                if (jumpAnimTimer <= 0) isJumpingAnim = false;
            }
        }
        
        function handleBlockCoins() {
            for (let b of blockCoins) {
                let dx = b.x - cameraX;
                if (dx + 32 < 0 || dx > W) continue;
                if (player.vy < 0 && player.y + player.h > b.y && player.y < b.y + 32 &&
                    player.x + player.w > b.x && player.x < b.x + 32 && !b.hit) {
                    b.hit = true;
                    playBlockHitSound();
                    coins.push({ x: b.x + 8, y: b.y - 15, w: 14, h: 14, collected: false });
                    player.vy = 2;
                }
            }
        }
        
        function handleHazards() {
            if (isRespawning) return false;
            for (let h of hazards) {
                if (player.x + player.w > h.x && player.x < h.x + 70 &&
                    player.y + player.h > h.y && player.y < h.y + 18) {
                    if (player.invincible <= 0) { loseLife(); return true; }
                }
            }
            for (let h of movingHazards) {
                if (player.x + player.w > h.x && player.x < h.x + 22 &&
                    player.y + player.h > h.y && player.y < h.y + 22) {
                    if (player.invincible <= 0) { loseLife(); return true; }
                }
            }
            return false;
        }
        
        function handleEnemies() {
            if (isRespawning) return;
            for (let e of enemies) {
                if (!e.alive) continue;
                let enemySpeed = e.speed || 0.9;
                if (e.type === 2 || e.type === 3) {
                    e.x += e.walkDir * enemySpeed;
                    if (e.x < 80 || e.x > worldWidth - 100) e.walkDir *= -1;
                }
                if (e.type === 1) e.frame += 0.08;
                if (player.x < e.x + 32 && player.x + player.w > e.x &&
                    player.y < e.y + 32 && player.y + player.h > e.y) {
                    if (player.vy > 0 && player.y + player.h - player.vy <= e.y + 12) {
                        e.alive = false;
                        totalScore += (e.type === 2 || e.type === 3) ? 200 : 100;
                        updateUI();
                        player.vy = -8;
                    } else if (player.invincible <= 0) { loseLife(); break; }
                }
            }
        }
        
        function collectCoins() {
            for (let c of coins) {
                if (!c.collected && player.x < c.x + 14 && player.x + player.w > c.x &&
                    player.y < c.y + 14 && player.y + player.h > c.y) {
                    c.collected = true;
                    totalCoins++;
                    totalScore += 25;
                    playCoinSound();
                    updateUI();
                }
            }
            for (let c of underwaterCoins) {
                if (!c.collected && player.x < c.x + 14 && player.x + player.w > c.x &&
                    player.y < c.y + 14 && player.y + player.h > c.y) {
                    c.collected = true;
                    totalCoins++;
                    totalScore += 25;
                    playCoinSound();
                    updateUI();
                }
            }
        }
        
        function checkPhaseComplete() {
            if (!phaseComplete && !showingResult && !showingDeath && !isRespawning) {
                let canComplete = true;
                if (guardian && !guardianDefeated && guardian.active) canComplete = false;
                if (flagGuardian && flagGuardian.active) canComplete = false;
                if (canComplete && player.x + player.w > worldWidth - 100) {
                    phaseComplete = true;
                    gameActive = false;
                    lowerMusicVolume();
                    playFlagFanfareOnce();
                    setTimeout(() => showResultScreen(), 2500);
                }
            }
        }
        
        function loadPhase(phase) {
            currentPhase = phase;
            buildPhase(phase);
            player = { x: 150, y: GROUND_Y - 38, w: 34, h: 38, vx: 0, vy: 0, onGround: true, facingRight: true, invincible: 0, legAnim: 0, isUnderwater: false };
            cameraX = 0;
            maxWaterProgressX = 150;
            gameActive = true;
            phaseComplete = false;
            showingResult = false;
            isJumpingAnim = false;
            jumpAnimTimer = 0;
            isRespawning = false;
            torchesList = [];
            stopSuspenseMusic();
            updateUI();
        }
        
        let leftPressed = false, rightPressed = false, jumpPressed = false;
        
        function updateGame() {
            if (!gameActive || phaseComplete || showingResult || showingDeath) return;
            if (isRespawning) {
                player.x += player.vx;
                if (player.x >= respawnTargetX) {
                    player.x = respawnTargetX;
                    player.vx = 0;
                    isRespawning = false;
                    player.invincible = 40;
                }
                player.vy += GRAVITY;
                player.y += player.vy;
                if (player.y + player.h >= GROUND_Y) { player.y = GROUND_Y - player.h; player.vy = 0; player.onGround = true; }
                let targetCam = player.x + player.w/2 - W/3.5;
                targetCam = Math.max(0, Math.min(targetCam, worldWidth - W));
                cameraX = cameraX * 0.92 + targetCam * 0.08;
                return;
            }
            updateBirds();
            updateMovingHazards();
            updateFish();
            updateTorches();
            updateFlagGuardian();
            let currentGravity = (player.isUnderwater) ? WATER_GRAVITY : GRAVITY;
            let currentJump = (player.isUnderwater && !player.onGround) ? WATER_JUMP : JUMP;
            let currentAcc = (player.isUnderwater) ? WATER_ACC : ACC;
            let currentMaxSpeed = (player.isUnderwater) ? WATER_MAX_SPEED : MAX_SPEED;
            if (jumpPressed && (player.onGround || player.isUnderwater)) {
                player.vy = currentJump;
                player.onGround = false;
                jumpPressed = false;
                isJumpingAnim = true;
                jumpAnimTimer = 8;
            }
            if (leftPressed) {
                player.vx = Math.max(-currentMaxSpeed, player.vx - currentAcc);
                player.facingRight = false;
                player.legAnim += 0.3;
            }
            if (rightPressed) {
                player.vx = Math.min(currentMaxSpeed, player.vx + currentAcc);
                player.facingRight = true;
                player.legAnim += 0.3;
            }
            if (!leftPressed && !rightPressed) player.vx *= FRICTION;
            player.x += player.vx;
            player.vy += currentGravity;
            player.y += player.vy;
            player.x = Math.max(50, Math.min(player.x, worldWidth - player.w - 50));
            handleCollisions();
            handleBlockCoins();
            if (giantMushroom && !giantMushroom.collected && player.x < giantMushroom.x + 40 && player.x + player.w > giantMushroom.x &&
                player.y < giantMushroom.y + 40 && player.y + player.h > giantMushroom.y) {
                giantMushroom.collected = true;
                playPowerUpSound();
            }
            if (guardian && guardian.active && !guardianDefeated && player.x < guardian.x + 90 && player.x + player.w > guardian.x &&
                player.y < guardian.y + 90 && player.y + player.h > guardian.y) {
                if (player.invincible <= 0 && !isRespawning) { loseLife(); }
            }
            if (player.y + player.h > H + 100) loseLife();
            handleHazards();
            handleEnemies();
            collectCoins();
            checkPhaseComplete();
            if (player.invincible > 0) player.invincible--;
            let targetCam = player.x + player.w/2 - W/3.5;
            targetCam = Math.max(0, Math.min(targetCam, worldWidth - W));
            cameraX = cameraX * 0.92 + targetCam * 0.08;
            if (jumpAnimTimer > 0) { jumpAnimTimer--; if (jumpAnimTimer <= 0) isJumpingAnim = false; }
        }
