<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Super Emanuelly - 33 Fases</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            touch-action: manipulation;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .game-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #0a0a1a;
            justify-content: space-between;
        }

        canvas {
            display: block;
            width: 100%;
            flex: 1;
            min-height: 0;
            background: #000;
            cursor: pointer;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000;
            padding: 10px 20px;
            color: #ffefb9;
            font-weight: bold;
            font-size: 14px;
            font-family: monospace;
            flex-wrap: wrap;
            gap: 8px;
            z-index: 10;
            border-bottom: 2px solid #ff69b4;
        }

        .game-title {
            background: #000;
            color: #ffffff;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            border: 2px solid #ff69b4;
            text-shadow: 0 0 5px #ff69b4;
        }

        .phase-badge {
            background: #ff69b4;
            color: #fff;
            padding: 5px 14px;
            border-radius: 25px;
            font-size: 12px;
        }

        .chance-badge {
            background: #ffaa33;
            color: #2a1a00;
            padding: 5px 14px;
            border-radius: 25px;
            font-size: 12px;
        }

        .touch-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(0,0,0,0.85);
            gap: 20px;
            margin-bottom: env(safe-area-inset-bottom, 0px);
            z-index: 10;
        }

        .dpad {
            display: flex;
            gap: 25px;
        }

        .right-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            width: 75px;
            height: 75px;
            border-radius: 60px;
            font-size: 32px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            touch-action: manipulation;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.3);
        }

        .btn-left, .btn-right {
            background: radial-gradient(circle at 30% 30%, #f5b062, #c26a22);
            color: #2d1c08;
        }

        .btn-jump {
            background: radial-gradient(circle at 30% 30%, #e55a3a, #aa2a1a);
            color: white;
            width: 85px;
            font-size: 28px;
        }

        .btn-torch {
            background: radial-gradient(circle at 30% 30%, #ff6600, #cc4400);
            color: white;
            width: 85px;
            font-size: 24px;
        }

        @media (max-width: 600px) {
            .btn { width: 65px; height: 65px; font-size: 28px; }
            .btn-jump { width: 75px; font-size: 24px; }
            .btn-torch { width: 75px; font-size: 20px; }
            .touch-controls { padding: 12px 20px; gap: 15px; }
            .info-panel { padding: 8px 15px; font-size: 11px; }
            .game-title { font-size: 12px; }
            .right-actions { gap: 10px; }
        }

        @media (max-width: 450px) {
            .btn { width: 55px; height: 55px; font-size: 24px; }
            .btn-jump { width: 65px; font-size: 20px; }
            .btn-torch { width: 65px; font-size: 18px; }
            .dpad { gap: 15px; }
            .game-title { font-size: 10px; }
            .right-actions { gap: 8px; }
        }

        .controls-footer {
            text-align: center;
            padding: 8px;
            color: #e6c88a;
            font-size: 11px;
            background: rgba(0,0,0,0.5);
        }

        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            font-family: monospace;
        }

        .result-box {
            background: linear-gradient(135deg, #ffcc44, #ff9933);
            padding: 30px 50px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 0 30px #ffaa00;
            border: 3px solid #fff;
        }

        .result-box h1 {
            font-size: 28px;
            color: #2a1a00;
            margin-bottom: 20px;
        }

        .result-box .coin-count {
            font-size: 48px;
            color: #ffdd00;
            text-shadow: 3px 3px 0 #aa6600;
            margin: 20px 0;
        }

        .result-box .next-btn {
            background: #2a6f3a;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="1000" height="500"></canvas>
    <div class="info-panel">
        <span class="game-title">⭐ SUPER EMANUELLY ⭐</span>
        <span class="phase-badge" id="phaseText">FASE 1/33</span>
        <span class="chance-badge" id="chanceText">❤️ 5/5</span>
        <span>🍄 <span id="scoreText">0</span></span>
        <span>🪙 <span id="coinText">0</span></span>
        <span>🔥 <span id="torchCount">10</span></span>
    </div>
    <div class="touch-controls">
        <div class="dpad">
            <button id="leftBtn" class="btn btn-left">◀</button>
            <button id="rightBtn" class="btn btn-right">▶</button>
        </div>
        <div class="right-actions">
            <button id="jumpBtn" class="btn btn-jump">⭐</button>
            <button id="torchBtn" class="btn btn-torch">🔥</button>
        </div>
    </div>
    <div class="controls-footer">
        👆 Toque nos botões | 🔥 TOCHA mata inimigos | 🐢 GUARDIÃO precisa de 10 tochas!
    </div>
</div>

<script>
    (function() {
        // ========== CONFIGURAÇÕES ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let W = 1000;
        let H = 500;
        const GROUND_Y = 430;
        
        function resizeCanvas() {
            const container = canvas.parentElement;
            const width = container.clientWidth;
            const availableHeight = window.innerHeight - 170;
            canvas.width = width;
            canvas.height = Math.min(availableHeight, 500);
            W = canvas.width;
            H = canvas.height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        // ========== ÁUDIO ==========
        let audioContext = null;
        let currentSongIndex = 0;
        let songTimeout = null;
        let musicGain = null;
        let isPlaying = false;
        let originalVolume = 0.5;
        let loweredVolume = 0.2;
        let isLoweringVolume = false;
        let rainGain = null;
        let windGain = null;
        let rainInterval = null;
        let windInterval = null;
        
        const tempo = 0.155;
        
        function noteFreq(note) {
            const map = {
                "C":-9,"C#":-8,"D":-7,"D#":-6,"E":-5,
                "F":-4,"F#":-3,"G":-2,"G#":-1,"A":0,"A#":1,"B":2
            };
            const pitch = note.slice(0,-1);
            const octave = parseInt(note.slice(-1));
            const semitone = map[pitch] + (octave - 4) * 12;
            return 440 * Math.pow(2, semitone / 12);
        }
        
        const fullSong = [
            ["E5",1],["E5",1],["R",1],["E5",1],["R",1],["C5",1],["E5",1],
            ["R",1],["G5",3],["R",3],["G4",3],
            ["C5",2],["R",2],["G4",2],["R",2],["E4",2],["R",2],
            ["A4",2],["B4",2],["A#4",1],["A4",2],
            ["G4",1.5],["E5",1.5],["G5",1.5],["A5",2],["F5",1],["G5",1],
            ["R",1],["E5",2],["C5",1],["D5",1],["B4",2],
            ["C5",2],["R",2],["G4",2],["R",2],["E4",2],["R",2],
            ["A4",2],["B4",2],["A#4",1],["A4",2],
            ["G4",1.5],["E5",1.5],["G5",1.5],["A5",2],["F5",1],["G5",1],
            ["R",1],["E5",2],["C5",1],["D5",1],["B4",2],
            ["R",2],
            ["G5",1],["F#5",1],["F5",1],["D#5",1],["E5",2],
            ["G#4",1],["A4",1],["C5",1],["A4",1],["C5",1],["D5",2],
            ["R",2],
            ["G5",1],["F#5",1],["F5",1],["D#5",1],["E5",2],
            ["C6",1],["C6",1],["C6",3],
            ["R",2],
            ["C5",1],["C5",1],["C5",1],["R",1],
            ["C5",1],["D5",1],["E5",2],
            ["C5",1],["D5",1],["E5",2],
            ["C5",1],["D5",1],["E5",1],["F5",1],["G5",4],
            ["R",2],
            ["G5",1],["G5",1],["G5",1],["E5",1],
            ["C5",1],["D5",1],["E5",3],
            ["R",1],
            ["C5",1],["D5",1],["B4",4],
            ["R",2],
            ["G5",1],["F#5",1],["F5",1],["D#5",1],["E5",2],
            ["G#4",1],["A4",1],["C5",1],["A4",1],["C5",1],["D5",2],
            ["D#5",2],["R",1],["D5",2],
            ["C5",4],
            ["R",2],
            ["C5",1],["G4",1],["E4",2],
            ["A4",1],["B4",1],["A#4",1],["A4",2],
            ["G4",2],["E5",2],
            ["G5",2],["A5",2],
            ["F5",1],["G5",1],["E5",2],
            ["C5",1],["D5",1],["B4",4],
            ["R",2],
            ["E5",1],["C5",1],["G4",2],
            ["G4",1],["A4",1],["B4",2],
            ["A4",1],["G4",1],["E4",3],
            ["G4",1],["C5",1],["E5",2],
            ["G5",3],
            ["R",2],
            ["C6",1],["G5",1],["E5",2],
            ["A5",1],["B5",1],["C6",4],
            ["R",2],
            ["G5",1],["E5",1],["C5",4],
            ["C5",2],["G4",2],["E4",8]
        ];
        
        const flagFanfare = [
            ["C5",0.25],["E5",0.25],["G5",0.25],["C6",0.5],
            ["G5",0.25],["E5",0.25],["C5",0.6]
        ];
        
        function initAudio() {
            if (audioContext) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            musicGain = audioContext.createGain();
            musicGain.gain.value = originalVolume;
            musicGain.connect(audioContext.destination);
            
            rainGain = audioContext.createGain();
            rainGain.gain.value = 0;
            rainGain.connect(audioContext.destination);
            
            windGain = audioContext.createGain();
            windGain.gain.value = 0;
            windGain.connect(audioContext.destination);
        }
        
        function startRainSound() {
            if (!audioContext || !rainGain) return;
            if (rainInterval) clearInterval(rainInterval);
            rainGain.gain.value = 0.15;
            rainInterval = setInterval(() => {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.type = 'triangle';
                osc.frequency.value = 800 + Math.random() * 400;
                gain.gain.value = 0.03 + Math.random() * 0.04;
                osc.connect(gain);
                gain.connect(rainGain);
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.2);
                osc.stop(audioContext.currentTime + 0.2);
            }, 100);
        }
        
        function stopRainSound() {
            if (rainInterval) {
                clearInterval(rainInterval);
                rainInterval = null;
            }
            if (rainGain) rainGain.gain.value = 0;
        }
        
        function startWindSound() {
            if (!audioContext || !windGain) return;
            if (windInterval) clearInterval(windInterval);
            windGain.gain.value = 0.12;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'sine';
            osc.frequency.value = 60;
            gain.gain.value = 0.1;
            osc.connect(gain);
            gain.connect(windGain);
            osc.start();
            gain.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.5);
            osc.stop(audioContext.currentTime + 0.5);
            
            windInterval = setInterval(() => {
                const osc2 = audioContext.createOscillator();
                const gain2 = audioContext.createGain();
                osc2.type = 'sine';
                osc2.frequency.value = 50 + Math.random() * 30;
                gain2.gain.value = 0.08;
                osc2.connect(gain2);
                gain2.connect(windGain);
                osc2.start();
                gain2.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.8);
                osc2.stop(audioContext.currentTime + 0.8);
            }, 1500);
        }
        
        function stopWindSound() {
            if (windInterval) {
                clearInterval(windInterval);
                windInterval = null;
            }
            if (windGain) windGain.gain.value = 0;
        }
        
        function playMusicNote(note, start, duration) {
            if (note === "R") return;
            const freq = noteFreq(note) * 0.65;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = "square";
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.0001, start);
            gain.gain.exponentialRampToValueAtTime(0.3, start + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
            osc.connect(gain);
            gain.connect(musicGain);
            osc.start(start);
            osc.stop(start + duration);
        }
        
        function playFanfareNote(note, start, duration) {
            if (note === "R") return;
            const freq = noteFreq(note) * 0.7;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = "square";
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.0001, start);
            gain.gain.exponentialRampToValueAtTime(0.35, start + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
            osc.connect(gain);
            gain.connect(musicGain);
            osc.start(start);
            osc.stop(start + duration);
        }
        
        function playFullSong() {
            if (!audioContext || !isPlaying) return;
            if (currentSongIndex >= fullSong.length) currentSongIndex = 0;
            
            const [note, len] = fullSong[currentSongIndex];
            const now = audioContext.currentTime;
            playMusicNote(note, now, tempo * len);
            
            currentSongIndex++;
            songTimeout = setTimeout(playFullSong, tempo * len * 1000);
        }
        
        function lowerMusicVolume() {
            if (!audioContext || !musicGain || isLoweringVolume) return;
            isLoweringVolume = true;
            musicGain.gain.setValueAtTime(musicGain.gain.value, audioContext.currentTime);
            musicGain.gain.linearRampToValueAtTime(loweredVolume, audioContext.currentTime + 0.3);
        }
        
        function restoreMusicVolume() {
            if (!audioContext || !musicGain) return;
            musicGain.gain.setValueAtTime(musicGain.gain.value, audioContext.currentTime);
            musicGain.gain.linearRampToValueAtTime(originalVolume, audioContext.currentTime + 0.3);
            setTimeout(() => { isLoweringVolume = false; }, 400);
        }
        
        function playFlagFanfareOnce() {
            if (!audioContext) return;
            let t = audioContext.currentTime;
            for (let i = 0; i < flagFanfare.length; i++) {
                const [note, dur] = flagFanfare[i];
                playFanfareNote(note, t, dur);
                t += dur;
            }
        }
        
        function startMusic() {
            if (!audioContext) initAudio();
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
            if (isPlaying) return;
            isPlaying = true;
            currentSongIndex = 0;
            if (songTimeout) clearTimeout(songTimeout);
            playFullSong();
        }
        
        function stopMusic() {
            isPlaying = false;
            if (songTimeout) clearTimeout(songTimeout);
        }
        
        function playCoinSound() {
            if (!audioContext) return;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'sine';
            osc.frequency.value = 1046.50;
            gain.gain.value = 0.4;
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.15);
            osc.stop(audioContext.currentTime + 0.15);
        }
        
        function playPowerUpSound() {
            if (!audioContext) return;
            const notes = [261.63, 329.63, 392.00];
            for (let i = 0; i < notes.length; i++) {
                setTimeout(() => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.type = 'square';
                    osc.frequency.value = notes[i];
                    gain.gain.value = 0.3;
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.15);
                    osc.stop(audioContext.currentTime + 0.15);
                }, i * 80);
            }
        }
        
        function playBlockHitSound() {
            if (!audioContext) return;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'square';
            osc.frequency.value = 440;
            gain.gain.value = 0.2;
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.1);
            osc.stop(audioContext.currentTime + 0.1);
        }
        
        function playTorchSound() {
            if (!audioContext) return;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'sine';
            osc.frequency.value = 600;
            gain.gain.value = 0.3;
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.2);
            osc.stop(audioContext.currentTime + 0.2);
        }
        
        // ========== CENÁRIOS ==========
        let rainDrops = [];
        
        function createRain() {
            rainDrops = [];
            for (let i = 0; i < 300; i++) {
                rainDrops.push({
                    x: Math.random() * (worldWidth + 500),
                    y: Math.random() * H,
                    speed: 8 + Math.random() * 12,
                    length: 12 + Math.random() * 15
                });
            }
        }
        
        function drawRain() {
            for (let drop of rainDrops) {
                let dx = drop.x - cameraX;
                if (dx > -10 && dx < W + 10) {
                    ctx.beginPath();
                    ctx.moveTo(dx, drop.y);
                    ctx.lineTo(dx - 3, drop.y + drop.length);
                    ctx.strokeStyle = "#aaddffaa";
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
                drop.y += drop.speed;
                if (drop.y > H) {
                    drop.y = 0;
                    drop.x = Math.random() * (worldWidth + 500);
                }
            }
        }
        
        function drawWindLines() {
            for (let i = 0; i < 30; i++) {
                let wx = (cameraX * 0.5 + i * 80) % (W + 200) - 100;
                ctx.beginPath();
                ctx.moveTo(wx, 50 + i * 15);
                ctx.lineTo(wx + 40, 45 + i * 15);
                ctx.strokeStyle = "#ffffff66";
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
        
        function drawMountainsAndTrees() {
            ctx.fillStyle = "#5a8e3a";
            for (let i = 0; i < 6; i++) {
                let mountainX = (i * 280) - (cameraX * 0.1) % 800;
                ctx.beginPath();
                ctx.moveTo(mountainX, GROUND_Y - 40);
                ctx.lineTo(mountainX + 80, GROUND_Y - 180);
                ctx.lineTo(mountainX + 160, GROUND_Y - 40);
                ctx.fill();
                ctx.fillStyle = "#4a7e2a";
                ctx.beginPath();
                ctx.moveTo(mountainX + 20, GROUND_Y - 40);
                ctx.lineTo(mountainX + 80, GROUND_Y - 150);
                ctx.lineTo(mountainX + 140, GROUND_Y - 40);
                ctx.fill();
            }
            
            for (let i = 0; i < 12; i++) {
                let treeX = (i * 250) - (cameraX * 0.2) % 800;
                ctx.fillStyle = "#3a6a1a";
                ctx.fillRect(treeX + 10, GROUND_Y - 60, 8, 40);
                ctx.fillStyle = "#2a5a0a";
                ctx.beginPath();
                ctx.ellipse(treeX + 14, GROUND_Y - 70, 12, 15, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(treeX + 6, GROUND_Y - 60, 10, 12, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(treeX + 22, GROUND_Y - 60, 10, 12, 0, 0, Math.PI*2);
                ctx.fill();
            }
        }
        
        function drawSkyBackground(phase) {
            const weatherType = (phase - 1) % 8;
            // 0: Dia sem chuva
            // 1: Noite sem chuva
            // 2: Dia com chuva
            // 3: Noite com chuva
            // 4: Noite com vento
            // 5: Dia com vento
            // 6: Noite com lua cheia gigante
            // 7: Noite com lua minguante
            
            const isNight = (weatherType === 1 || weatherType === 3 || weatherType === 4 || weatherType === 6 || weatherType === 7);
            const hasRain = (weatherType === 2 || weatherType === 3);
            const hasWind = (weatherType === 4 || weatherType === 5);
            const isFullMoon = (weatherType === 6);
            const isWaningMoon = (weatherType === 7);
            
            if (hasRain && rainDrops.length === 0) {
                createRain();
                startRainSound();
            } else if (!hasRain && rainDrops.length > 0) {
                rainDrops = [];
                stopRainSound();
            }
            
            if (hasWind) {
                startWindSound();
            } else {
                stopWindSound();
            }
            
            if (isNight) {
                const grad = ctx.createLinearGradient(0, 0, 0, H);
                grad.addColorStop(0, "#0a0a2a");
                grad.addColorStop(1, "#1a1a3a");
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);
                
                ctx.fillStyle = "#ffffffcc";
                for (let i = 0; i < 100; i++) {
                    let starX = (i * 131) % W;

                    let starSize = (i % 3) + 1;
                    ctx.fillRect(starX, starY, starSize, starSize);
                }
                
                if (isFullMoon || isWaningMoon) {
                    let moonSize = isFullMoon ? 70 : 45;
                    ctx.fillStyle = "#ffffdd";
                    ctx.beginPath();
                    ctx.ellipse(W - 100, 70, moonSize, moonSize, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "#ffffaa";
                    ctx.beginPath();
                    ctx.ellipse(W - 100, 70, moonSize - 10, moonSize - 10, 0, 0, Math.PI*2);
                    ctx.fill();
                    if (isWaningMoon) {
                        ctx.fillStyle = "#0a0a2a";
                        ctx.beginPath();
                        ctx.ellipse(W - 85, 65, 20, 20, 0, 0, Math.PI*2);
                        ctx.fill();
                    }
                } else if (weatherType === 1) {
                    ctx.fillStyle = "#ffffdd";
                    ctx.beginPath();
                    ctx.ellipse(W - 80, 70, 35, 35, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "#ffffaa";
                    ctx.beginPath();
                    ctx.ellipse(W - 73, 63, 10, 10, 0, 0, Math.PI*2);
                    ctx.fill();
                }
            } else {
                const grad = ctx.createLinearGradient(0, 0, 0, H);
                grad.addColorStop(0, "#87CEEB");
                grad.addColorStop(1, "#4A90D9");
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);
                
                ctx.fillStyle = "#ffe066";
                ctx.beginPath();
                ctx.ellipse(W - 80, 70, 45, 45, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#ffcc44";
                ctx.beginPath();
                ctx.ellipse(W - 80, 70, 35, 35, 0, 0, Math.PI*2);
                ctx.fill();
                for (let i = 0; i < 12; i++) {
                    let angle = i * Math.PI * 2 / 12;
                    let x1 = W - 80 + Math.cos(angle) * 55;
                    let y1 = 70 + Math.sin(angle) * 55;
                    let x2 = W - 80 + Math.cos(angle) * 75;
                    let y2 = 70 + Math.sin(angle) * 75;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = "#ffcc44";
                    ctx.stroke();
                }

            // Nuvens

                    ctx.beginPath();
                    ctx.ellipse(flowerX + 2, GROUND_Y - 15, 2, 2, 0, 0, Math.PI*2);

        // ========== ESTADO DO JOGO ==========

        function throwTorch() {

            torches--;
            updateTorchDisplay();
            playTorchSound();
            
            torchesList.push({
                x: player.x + (player.facingRight ? player.w + 5 : -20),

        function updateTorches() {
            for (let i = 0; i < torchesList.length; i++) {
                const t = torchesList[i];
                t.x += t.vx;
                t.y += t.vy;
                t.vy += 0.3;
                
                if (t.y > H + 50 || t.x < -100 || t.x > worldWidth + 100) {
                    torchesList.splice(i, 1);
                    i--;
                    continue;
                }
                
                if (guardian && !guardianDefeated && guardian.active &&
                    t.x < guardian.x + guardian.w && t.x + t.width > guardian.x &&
                    t.y < guardian.y + guardian.h && t.y + t.height > guardian.y) {
                    guardianHits++;
                    playTorchSound();
                    torchesList.splice(i, 1);
                    i--;
                    if (guardianHits >= 10) {
                        guardianDefeated = true;
                        guardian.active = false;
                        totalScore += 1000;
                        updateUI();
                    }
                    continue;
                }
                
                for (let j = 0; j < enemies.length; j++) {
                    const e = enemies[j];
                    if (e.alive && t.x < e.x + e.w && t.x + t.width > e.x &&
                        t.y < e.y + e.h && t.y + t.height > e.y) {

        function drawTorches() {

                ctx.beginPath();
                ctx.moveTo(t.x - cameraX + 6, t.y - 5);
                ctx.lineTo(t.x - cameraX + 12, t.y);
                ctx.lineTo(t.x - cameraX, t.y);
                ctx.fill();
            }
        }
        
        function buildPhase(phase) {
            worldWidth = 8000 + (phase * 80);
            const baseY = GROUND_Y;
            guardianHits = 0;
            guardianDefeated = false;
            giantMushroom = null;
            guardian = null;
            torches = 10;
            updateTorchDisplay();
            
            platforms = [{ x: 0, y: baseY, w: worldWidth, h: 18, type: 'ground' }];
            
            const platCount = 12 + Math.floor(phase / 2);
            for (let i = 0; i < platCount; i++) {
                let px = 250 + (i * 420) + (phase * 15);
                let py = baseY - 45 - (i % 5) * 32;
                if (px < worldWidth - 250) {
                    platforms.push({ x: px, y: py, w: 75, h: 24, type: 'brick' });
                    if (phase > 15 && i % 3 === 0) {
                        platforms.push({ x: px + 60, y: py - 45, w: 60, h: 24, type: 'brick' });
                    }
                }
            }
            
            blockCoins = [];
            for (let i = 0; i < 15 + Math.floor(phase / 3); i++) {
                let bx = 200 + (i * 450) + (phase * 18);
                let by = baseY - 65 - (i % 4) * 32;
                if (bx < worldWidth - 200) {
                    blockCoins.push({ x: bx, y: by, w: 32, h: 32, hit: false });
                }
            }
            
            enemies = [];
            const enemyCount = 6 + Math.floor(phase / 2);
            for (let i = 0; i < enemyCount; i++) {
                let ex = 350 + (i * 550) + (phase * 20);
                if (ex < worldWidth - 350) {
                    enemies.push({
                        x: ex, y: baseY - 34, w: 32, h: 32,
                        alive: true, type: i % 4,
                        walkDir: i % 2 === 0 ? 1 : -1, frame: 0
                    });
                }
            }
            
            coins = [];
            const coinCount = 80 + Math.floor(phase * 1.5);
            for (let i = 0; i < coinCount; i++) {
                let cx = 100 + (i * 90) + (phase * 10);
                if (cx < worldWidth - 150) {
                    let cy;
                    let tipo = i % 5;
                    if (tipo === 0) cy = baseY - 48;
                    else if (tipo === 1) cy = baseY - 75;
                    else if (tipo === 2) cy = baseY - 100;
                    else if (tipo === 3) cy = baseY - 125;
                    else cy = baseY - 35;
                    coins.push({ x: cx, y: cy, w: 14, h: 14, collected: false });
                }
            }
            
            for (let i = 0; i < platforms.length; i++) {
                if (platforms[i].type !== 'ground') {
                    for (let j = 0; j < 2; j++) {
                        coins.push({ x: platforms[i].x + 20 + (j * 30), y: platforms[i].y - 20, w: 14, h: 14, collected: false });
                    }
                }
            }
            
            if (phase >= 8) {
                giantMushroom = { x: worldWidth - 450, y: baseY - 65, w: 40, h: 40, collected: false };
            }
            
            if (phase >= 15) {
                guardian = {
                    x: worldWidth - 280, y: baseY - 80, w: 90, h: 90,
                    active: true, health: 10
                };
            }
            
            hazards = [];
            if (phase >= 4) {
                for (let i = 0; i < 5 + Math.floor(phase / 5); i++) {
                    let hx = 400 + (i * 550) + (phase * 25);
                    if (hx < worldWidth - 300) {
                        hazards.push({ x: hx, y: baseY - 18, w: 70, h: 18, type: (phase + i) % 2, active: true });
                    }
                }
            }
            
            movingHazards = [];
            if (phase >= 7) {
                for (let i = 0; i < 4 + Math.floor(phase / 7); i++) {
                    let mx = 450 + (i * 600) + (phase * 30);
                    if (mx < worldWidth - 300) {
                        movingHazards.push({
                            x: mx, y: baseY - 50, w: 20, h: 20, type: i % 2,
                            direction: 1, speed: 2 + (phase % 4)
                        });
                    }
                }
            }
            
            birds = [];
            for (let i = 0; i < 12; i++) {
                birds.push({
                    x: Math.random() * (worldWidth + 500), y: 35 + Math.random() * 120,
                    speed: 0.4 + Math.random() * 0.7, wing: Math.random() * Math.PI * 2, size: 4 + Math.random() * 5
                });
            }
        }

                let dx = giantMushroom.x - cameraX;

                    ctx.font = "bold 14px monospace";
                    ctx.fillText("+10", dx + 12, giantMushroom.y - 5);

            }
        }
        
        function handleGiantMushroom() {
            if (giantMushroom && !giantMushroom.collected &&

        function drawGuardian() {
            if (guardian && guardian.active && !guardianDefeated) {
                let dx = guardian.x - cameraX;
                if (dx + 90 > 0 && dx < W) {
                    ctx.fillStyle = "#2a6a2a";

                    ctx.fillRect(dx + 12, guardian.y + 12, 66, 66);

                    ctx.beginPath();
                    ctx.ellipse(dx + 45, guardian.y + 45, 35, 30, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "#3a7a3a";
                    ctx.fillRect(dx + 35, guardian.y - 18, 20, 25);
                    ctx.fillStyle = "#000";
                    ctx.fillRect(dx + 40, guardian.y - 12, 5, 5);
                    ctx.fillRect(dx + 48, guardian.y - 12, 5, 5);
                    ctx.fillStyle = "#ff0000";
                    ctx.fillRect(dx + 10, guardian.y - 10, 70, 8);
                    ctx.fillStyle = "#00ff00";
                    let healthPercent = (10 - guardianHits) / 10;
                    ctx.fillRect(dx + 10, guardian.y - 10, 70 * healthPercent, 8);

                    ctx.font = "bold 12px monospace";
                    ctx.fillText(`💪 ${10 - guardianHits}`, dx + 30, guardian.y - 15);

        }
        
        function handleGuardian() {
            if (guardian && guardian.active && !guardianDefeated &&
                player.x < guardian.x + 90 && player.x + player.w > guardian.x &&
                player.y < guardian.y + 90 && player.y + player.h > guardian.y) {

                    return true;

            return false;

        function updateMovingHazards() {
            for (let h of movingHazards) {
                h.x += h.speed * h.direction;
                if (h.x < 100 || h.x > worldWidth - 100) h.direction *= -1;
            }
        }
        
        function updateBirds() {
            for (let b of birds) {
                b.x += b.speed;
                if (b.x > worldWidth + 200) b.x = -100;
                b.wing += 0.15;
            }
        }
        
        function drawBirds() {
            for (let b of birds) {
                let dx = b.x - cameraX;
                if (dx < -50 || dx > W + 50) continue;
                ctx.fillStyle = "#444";
                ctx.beginPath();
                ctx.ellipse(dx, b.y, b.size, b.size/1.5, 0, 0, Math.PI*2);
                ctx.fill();
                const wingY = Math.sin(b.wing) > 0 ? -4 : 3;
                ctx.fillStyle = "#666";
                ctx.beginPath();
                ctx.moveTo(dx - b.size, b.y);
                ctx.lineTo(dx - b.size - 5, b.y + wingY);
                ctx.lineTo(dx - b.size, b.y + 1);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(dx + b.size, b.y);
                ctx.lineTo(dx + b.size + 5, b.y + wingY);
                ctx.lineTo(dx + b.size, b.y + 1);
                ctx.fill();
                ctx.fillStyle = "#fff";
                ctx.fillRect(dx + b.size/2, b.y - 2, 2, 2);
            }
        }
        
        function handleCollisions() {
            let newY = player.y;
            let grounded = false;
            for (let plat of platforms) {
                if (player.x + player.w > plat.x && player.x < plat.x + plat.w) {
                    if (player.y + player.h <= plat.y + 12 && player.y + player.h + player.vy >= plat.y) {
                        newY = plat.y - player.h;
                        grounded = true;
                        player.vy = 0;
                        break;
                    }
                    if (player.vy < 0 && player.y <= plat.y + plat.h && player.y + player.vy >= plat.y + plat.h) {
                        player.vy = 3;
                    }
                }
            }
            player.y = newY;
            player.onGround = grounded;
            if (player.y + player.h >= GROUND_Y && !grounded) {
                player.y = GROUND_Y - player.h;
                player.vy = 0;
                player.onGround = true;
            }
        }
        
        function handleBlockCoins() {
            for (let b of blockCoins) {
                let dx = b.x - cameraX;
                if (dx + 32 < 0 || dx > W) continue;
                if (player.vy < 0 && player.y + player.h > b.y && player.y < b.y + 32 &&
                    player.x + player.w > b.x && player.x < b.x + 32 && !b.hit) {
                    b.hit = true;
                    playBlockHitSound();
                    coins.push({ x: b.x + 8, y: b.y - 15, w: 14, h: 14, collected: false });
                    player.vy = 2;
                }
            }
        }
        
        function loseLife() {
            if (player.invincible > 0) return;
            phaseLives--;
            updateLivesDisplay();
            if (phaseLives <= 0) {
                alert("💀 VOCÊ MORREU! Voltando para a FASE 1... 💀");
                currentPhase = 1;
                phaseLives = 5;
                totalScore = 0;
                totalCoins = 0;
                loadPhase(1);
                if (isPlaying) {
                    stopMusic();
                    setTimeout(startMusic, 100);
                }
            } else {
                player.x = 80;
                player.y = GROUND_Y - player.h;
                player.vx = 0;
                player.vy = 0;
                player.invincible = 40;
                cameraX = 0;
            }
            updateUI();
        }
        
        function handleHazards() {
            for (let h of hazards) {
                if (player.x + player.w > h.x && player.x < h.x + 70 &&
                    player.y + player.h > h.y && player.y < h.y + 18) {
                    if (player.invincible <= 0) { loseLife(); return true; }
                }
            }
            for (let h of movingHazards) {
                if (player.x + player.w > h.x && player.x < h.x + 20 &&
                    player.y + player.h > h.y && player.y < h.y + 20) {
                    if (player.invincible <= 0) { loseLife(); return true; }
                }
            }
            return false;
        }
        
        function handleEnemies() {
            for (let e of enemies) {
                if (!e.alive) continue;
                if (e.type === 2 || e.type === 3) {
                    e.x += e.walkDir * 0.9;
                    if (e.x < 50 || e.x > worldWidth - 80) e.walkDir *= -1;
                }
                if (e.type === 1) e.frame += 0.05;
                if (player.x < e.x + 32 && player.x + player.w > e.x &&
                    player.y < e.y + 32 && player.y + player.h > e.y) {
                    if (player.vy > 0 && player.y + player.h - player.vy <= e.y + 10) {
                        e.alive = false;
                        totalScore += (e.type === 2 || e.type === 3) ? 200 : 100;
                        updateUI();
                        player.vy = -8;
                    } else if (player.invincible <= 0) { loseLife(); break; }
                }
            }
        }
        
        function collectCoins() {
            for (let c of coins) {
                if (!c.collected && player.x < c.x + 14 && player.x + player.w > c.x &&
                    player.y < c.y + 14 && player.y + player.h > c.y) {
                    c.collected = true;
                    totalCoins++;
                    totalScore += 25;
                    playCoinSound();
                    updateUI();
                }
            }
        }
        
        function checkPhaseComplete() {
            if (!phaseComplete && !showingResult) {
                let canComplete = true;
                if (guardian && !guardianDefeated && guardian.active) canComplete = false;
                if (canComplete && player.x + player.w > worldWidth - 80) {
                    phaseComplete = true;
                    gameActive = false;
                    lowerMusicVolume();
                    playFlagFanfareOnce();
                    setTimeout(() => showResultScreen(), 2500);
                }
            }
        }
        
        function loadPhase(phase) {
            currentPhase = phase;
            const weatherIndex = (phase - 1) % 8;
            const weatherDesc = weatherNames[weatherIndex] || weatherNames[0];
            document.getElementById('phaseText').innerHTML = `FASE ${phase}/33 - ${weatherDesc}`;
            updateLivesDisplay();
            buildPhase(phase);
            player = { x: 80, y: GROUND_Y - 38, w: 34, h: 38, vx: 0, vy: 0, onGround: true, facingRight: true, invincible: 0, legAnim: 0 };
            cameraX = 0;
            gameActive = true;
            phaseComplete = false;
            showingResult = false;
            updateUI();
        }
        
        function updateUI() {
            document.getElementById('scoreText').innerText = Math.floor(totalScore);
            document.getElementById('coinText').innerText = totalCoins;
        }
        
        let leftPressed = false, rightPressed = false, jumpPressed = false;
        
        function updateGame() {
            if (!gameActive || phaseComplete || showingResult) return;
            updateBirds();
            updateMovingHazards();
            updateTorches();
            if (jumpPressed && player.onGround) { player.vy = JUMP; player.onGround = false; jumpPressed = false; }
            if (leftPressed) { player.vx = Math.max(-MAX_SPEED, player.vx - ACC); player.facingRight = false; player.legAnim += 0.3; }
            if (rightPressed) { player.vx = Math.min(MAX_SPEED, player.vx + ACC); player.facingRight = true; player.legAnim += 0.3; }
            if (!leftPressed && !rightPressed) player.vx *= FRICTION;
            player.x += player.vx;
            player.vy += GRAVITY;
            player.y += player.vy;
            player.x = Math.max(30, Math.min(player.x, worldWidth - player.w - 30));
            handleCollisions();
            handleBlockCoins();
            handleGiantMushroom();
            handleGuardian();
            if (player.y + player.h > H + 80) loseLife();
            handleHazards();
            handleEnemies();
            collectCoins();
            checkPhaseComplete();
            if (player.invincible > 0) player.invincible--;
            let targetCam = player.x + player.w/2 - W/3.5;
            targetCam = Math.max(0, Math.min(targetCam, worldWidth - W));
            cameraX = cameraX * 0.92 + targetCam * 0.08;
        }
        
        function drawPlatforms() {
            for (let plat of platforms) {
                let dx = plat.x - cameraX;
                if (dx + plat.w < 0 || dx > W) continue;
                ctx.fillStyle = "#8b6946";
                ctx.fillRect(dx, plat.y, plat.w, plat.h);
                ctx.fillStyle = "#5d3f20";
                ctx.fillRect(dx, plat.y + 3, plat.w, 4);
            }
        }
        
        function drawBlockCoinsVisual() {
            for (let b of blockCoins) {
                let dx = b.x - cameraX;
                if (dx + 32 < 0 || dx > W) continue;
                ctx.fillStyle = "#c8a84a";
                ctx.fillRect(dx, b.y, 32, 32);
                ctx.fillStyle = "#a07830";
                ctx.fillRect(dx + 4, b.y + 4, 24, 24);
                ctx.fillStyle = "#ffdd55";
                ctx.font = "bold 20px monospace";
                ctx.fillText("?", dx + 11, b.y + 24);
            }
        }
        
        function drawHazardsVisual() {
            for (let h of hazards) {
                let dx = h.x - cameraX;
                if (dx + 70 < 0 || dx > W) continue;
                if (h.type === 0) {
                    ctx.fillStyle = "#3399ffcc";
                    ctx.fillRect(dx, h.y, 70, 18);
                } else {
                    ctx.fillStyle = "#ff4400";
                    ctx.fillRect(dx, h.y, 70, 18);
                    for (let i = 0; i < 5; i++) {
                        ctx.beginPath();
                        ctx.moveTo(dx + 8 + i*13, h.y - 6);
                        ctx.lineTo(dx + 12 + i*13, h.y);
                        ctx.lineTo(dx + 4 + i*13, h.y);
                        ctx.fillStyle = "#ff8800";
                        ctx.fill();
                    }
                }
            }
            for (let h of movingHazards) {
                let dx = h.x - cameraX;
                if (dx + 20 < 0 || dx > W) continue;
                ctx.fillStyle = "#ff6600";
                ctx.beginPath();
                ctx.ellipse(dx + 10, h.y + 10, 10, 10, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#ffcc00";
                ctx.beginPath();
                ctx.ellipse(dx + 8, h.y + 8, 4, 4, 0, 0, Math.PI*2);
                ctx.fill();
            }
        }
        
        function drawCoinsVisual() {
            for (let c of coins) {
                if (c.collected) continue;
                let dx = c.x - cameraX;
                if (dx + 14 < 0 || dx > W) continue;
                ctx.fillStyle = "#ffdd55";
                ctx.beginPath();
                ctx.ellipse(dx + 7, c.y + 7, 7, 9, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#e6b800";
                ctx.fillRect(dx + 3, c.y + 5, 8, 4);
            }
        }
        
        function drawEnemiesVisual() {
            for (let e of enemies) {
                if (!e.alive) continue;
                let dx = e.x - cameraX;
                if (dx + 32 < 0 || dx > W) continue;
                if (e.type === 0) {
                    ctx.fillStyle = "#8b5a2b";
                    ctx.fillRect(dx, e.y, 32, 32);
                    ctx.fillStyle = "#593a18";
                    ctx.fillRect(dx + 6, e.y + 12, 7, 8);
                    ctx.fillRect(dx + 19, e.y + 12, 7, 8);
                    ctx.fillStyle = "#000";
                    ctx.fillRect(dx + 9, e.y + 8, 4, 5);
                    ctx.fillRect(dx + 20, e.y + 8, 4, 5);
                } else if (e.type === 1) {
                    let height = 25 + Math.sin(e.frame) * 5;
                    ctx.fillStyle = "#2d8c3c";
                    ctx.fillRect(dx + 6, e.y + 32 - height, 20, height);
                    ctx.fillStyle = "#c44a2a";
                    ctx.beginPath();
                    ctx.ellipse(dx + 16, e.y + 32 - height - 4, 10, 8, 0, 0, Math.PI*2);
                    ctx.fill();
                } else if (e.type === 2) {
                    ctx.fillStyle = "#6cb03c";
                    ctx.fillRect(dx, e.y, 32, 32);
                    ctx.fillStyle = "#e8c86a";
                    ctx.fillRect(dx + 4, e.y + 6, 24, 8);
                    ctx.fillStyle = "#4a8a2a";
                    ctx.fillRect(dx + 8, e.y + 18, 16, 10);
                } else {
                    ctx.fillStyle = "#3a5a7a";
                    ctx.fillRect(dx, e.y, 32, 32);
                    ctx.fillStyle = "#2a4a6a";
                    ctx.fillRect(dx + 4, e.y + 4, 24, 8);
                }
            }
        }
        
        function drawMarioVisual() {
            if (player.invincible > 0 && (Math.floor(Date.now() / 60) % 3 === 0)) return;
            let x = player.x - cameraX;
            let y = player.y;
            ctx.fillStyle = "#ff69b4";
            ctx.fillRect(x, y, 34, 38);
            ctx.fillStyle = "#fec280";
            ctx.fillRect(x + 8, y + 6, 10, 10);
            ctx.fillStyle = "#000";
            ctx.fillRect(x + 22, y + 10, 5, 6);
            ctx.fillStyle = "#8b4513";
            ctx.beginPath();
            ctx.ellipse(x + 26, y + 15, 4, 3, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#5a2e0a";
            ctx.fillRect(x + 12, y + 20, 7, 5);
            ctx.fillRect(x + 18, y + 20, 5, 4);
            ctx.fillStyle = "#ff1493";
            ctx.fillRect(x + 4, y - 5, 28, 9);
            ctx.fillStyle = "#fff";
            ctx.fillRect(x + 18, y - 3, 8, 5);
            ctx.fillStyle = "#ffb6c1";
            ctx.fillRect(x + 5, y + 24, 26, 12);
            const legMove = Math.sin(player.legAnim) * 4;
            ctx.fillStyle = "#ffb6c1";
            ctx.fillRect(x + 6, y + 32, 7, 7 + (player.onGround ? legMove : 0));
            ctx.fillRect(x + 22, y + 32, 7, 7 - (player.onGround ? legMove : 0));
            ctx.fillStyle = "#f0c060";
            ctx.fillRect(x + 14, y + 28, 4, 4);
            ctx.fillRect(x + 22, y + 28, 4, 4);
        }
        
        function drawFlagVisual() {
            let fx = worldWidth - 100 - cameraX;
            if (fx + 30 > 0 && fx < W) {
                ctx.fillStyle = "#b87a3a";
                ctx.fillRect(fx, GROUND_Y - 130, 8, 130);
                ctx.fillStyle = "#ff5533";
                ctx.beginPath();
                ctx.moveTo(fx + 6, GROUND_Y - 130);
                ctx.lineTo(fx + 55, GROUND_Y - 108);
                ctx.lineTo(fx + 6, GROUND_Y - 86);
                ctx.fill();
                ctx.fillStyle = "#ffdd99";
                ctx.font = "bold 18px monospace";
                ctx.fillText("🏁", fx + 20, GROUND_Y - 145);
            }
        }
        
        function drawTitleVisual() {
            ctx.font = "bold 22px 'Courier New'";
            ctx.fillStyle = "#000";
            ctx.fillRect(10, 25, 265, 35);
            ctx.strokeStyle = "#ff69b4";
            ctx.lineWidth = 2;
            ctx.strokeRect(10, 25, 265, 35);
            ctx.fillStyle = "#fff";
            ctx.fillText("⭐ SUPER EMANUELLY ⭐", 15, 52);
            ctx.font = "9px monospace";
            ctx.fillStyle = "#ffcc88";
            ctx.fillText(`FASE ${currentPhase}/33`, 15, 80);
        }
        
        function render() {
            drawSkyBackground(currentPhase);
            drawPlatforms();
            drawBlockCoinsVisual();
            drawHazardsVisual();
            drawCoinsVisual();
            drawEnemiesVisual();
            drawGiantMushroom();
            drawGuardian();
            drawTorches();
            drawMarioVisual();
            drawFlagVisual();
            drawTitleVisual();
            drawBirds();
        }
        
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        const jumpBtn = document.getElementById('jumpBtn');
        const torchBtn = document.getElementById('torchBtn');
        
        leftBtn.onmousedown = leftBtn.ontouchstart = (e) => { e.preventDefault(); leftPressed = true; };
        leftBtn.onmouseup = leftBtn.ontouchend = () => leftPressed = false;
        leftBtn.onmouseleave = () => leftPressed = false;
        
        rightBtn.onmousedown = rightBtn.ontouchstart = (e) => { e.preventDefault(); rightPressed = true; };
        rightBtn.onmouseup = rightBtn.ontouchend = () => rightPressed = false;
        rightBtn.onmouseleave = () => rightPressed = false;
        
        jumpBtn.onmousedown = jumpBtn.ontouchstart = (e) => { e.preventDefault(); jumpPressed = true; };
        torchBtn.onclick = torchBtn.ontouchstart = (e) => { e.preventDefault(); throwTorch(); };
        
        window.onkeydown = (e) => {
            if (e.key === 'ArrowLeft') { leftPressed = true; e.preventDefault(); }
            if (e.key === 'ArrowRight') { rightPressed = true; e.preventDefault(); }
            if (e.key === 'ArrowUp' || e.key === ' ') { jumpPressed = true; e.preventDefault(); }
            if (e.key === 't' || e.key === 'T') { throwTorch(); e.preventDefault(); }
        };
        window.onkeyup = (e) => {
            if (e.key === 'ArrowLeft') leftPressed = false;
            if (e.key === 'ArrowRight') rightPressed = false;
            if (e.key === 'ArrowUp' || e.key === ' ') jumpPressed = false;
        };
        
        function enableAudio() {
            initAudio();
            startMusic();
            document.body.removeEventListener('touchstart', enableAudio);
            document.body.removeEventListener('click', enableAudio);
        }
        document.body.addEventListener('touchstart', enableAudio);
        document.body.addEventListener('click', enableAudio);
        
        loadPhase(1);
        function gameLoop() { updateGame(); render(); requestAnimationFrame(gameLoop); }
        gameLoop();
    })();
</script>
</body>
</html>
